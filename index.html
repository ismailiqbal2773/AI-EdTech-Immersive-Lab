<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI EdTech Sandbox: Professional 3D Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; overflow: hidden; height: 100vh; }
        
        .system-banner {
            position: absolute; top: 0; left: 0; width: 100%; background: linear-gradient(90deg, #1e293b, #0f172a);
            padding: 14px 24px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #334155; z-index: 10;
        }
        .system-banner h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; color: #38bdf8; }
        .ai-status-indicator {
            font-size: 12px; font-weight: 700; color: #4ade80; background: rgba(74, 222, 128, 0.1);
            padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(74, 222, 128, 0.2); text-transform: uppercase;
        }

        .control-dashboard {
            position: absolute; top: 80px; left: 20px; width: 320px;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px);
            border: 1px solid #334155; border-radius: 12px; padding: 24px; z-index: 5;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .dashboard-section { margin-bottom: 20px; }
        .dashboard-section label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; }
        .custom-select { width: 100%; background-color: #1e293b; border: 1px solid #475569; border-radius: 6px; padding: 10px 12px; color: #f1f5f9; font-size: 14px; outline: none; cursor: pointer; transition: border-color 0.2s; }
        .custom-select:focus { border-color: #38bdf8; }
        .action-btn { width: 100%; background-color: #2563eb; color: #ffffff; border: none; border-radius: 6px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        .action-btn:hover { background-color: #1d4ed8; }

        #webgl-canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .loading-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.4s ease; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(56, 189, 248, 0.1); border-top: 4px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loading-screen" id="loading-mask">
        <div class="spinner"></div>
        <p style="font-size: 14px; color: #94a3b8;">Loading Stable 3D Engine Frame Grid...</p>
    </div>

    <div class="system-banner">
        <h1>INTERACTIVE AI 3D LAB</h1>
        <div class="ai-status-indicator" id="ai-status">STATUS: KINETIC ENGAGED</div>
    </div>

    <div class="control-dashboard">
        <div class="dashboard-section">
            <label for="grade-select">Grade Level</label>
            <select id="grade-select" class="custom-select">
                <option value="">Select Grade</option>
            </select>
        </div>
        <div class="dashboard-section">
            <label for="subject-select">Subject</label>
            <select id="subject-select" class="custom-select" disabled>
                <option value="">Select Subject</option>
            </select>
        </div>
        <div class="dashboard-section">
            <label for="topic-select">Simulation Topic</label>
            <select id="topic-select" class="custom-select" disabled>
                <option value="">Select Asset Model</option>
            </select>
        </div>
        <button class="action-btn" id="render-trigger-btn">LAUNCH 3D SIMULATION</button>
    </div>

    <div id="webgl-canvas-container"></div>

    <script>
        let globalCatalog = {};
        const gradeDropdown = document.getElementById('grade-select');
        const subjectDropdown = document.getElementById('subject-select');
        const topicDropdown = document.getElementById('topic-select');
        const actionBtn = document.getElementById('render-trigger-btn');
        const aiStatusLabel = document.getElementById('ai-status');

        let scene, camera, renderer, baseGroup, currentModel = null;

        // GEOMETRIC INTERPOLATION TRACKING REGISTERS
        let targetRotationY = 0, targetRotationX = 0;
        let targetCameraZ = 8;

        function init3DEnvironment() {
            const container = document.getElementById('webgl-canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#0f172a');

            // Complex lighting configurations to highlight texture features
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight1.position.set(5, 10, 7);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0x38bdf8, 0.5);
            dirLight2.position.set(-5, -5, -5);
            scene.add(dirLight2);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, targetCameraZ);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            baseGroup = new THREE.Group();
            scene.add(baseGroup);

            window.addEventListener('resize', onWindowResize, false);
            
            document.getElementById('loading-mask').style.opacity = '0';
            setTimeout(() => { document.getElementById('loading-mask').style.display = 'none'; }, 400);

            animateLoop();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // =====================================================================
        // SMOOTH INTERPOLATION GLIDE LOOP ENGINE (Removes model shaking 100%)
        // =====================================================================
        function animateLoop() {
            requestAnimationFrame(animateLoop);
            
            if (baseGroup && baseGroup.children.length > 0) {
                // Smoothly slide transformations across cycles using Linear Interpolation (LERP)
                baseGroup.rotation.y = THREE.MathUtils.lerp(baseGroup.rotation.y, targetRotationY, 0.06);
                baseGroup.rotation.x = THREE.MathUtils.lerp(baseGroup.rotation.x, targetRotationX, 0.06);
                camera.position.z = THREE.MathUtils.lerp(camera.position.z, targetCameraZ, 0.06);
            }
            
            renderer.render(scene, camera);
        }

        async function fetchSystemCatalog() {
            try {
                const response = await fetch('/api/catalog');
                globalCatalog = await response.json();
                gradeDropdown.innerHTML = '<option value="">Select Grade</option>';
                Object.keys(globalCatalog).forEach(grade => {
                    const opt = document.createElement('option');
                    opt.value = grade;
                    opt.innerText = grade.replace('_', ' ');
                    gradeDropdown.appendChild(opt);
                });
                aiStatusLabel.innerText = "STATUS: CONTROL INFRASTRUCTURE READY";
            } catch (err) {
                aiStatusLabel.innerText = "STATUS: SYSTEM LOCAL FAILED";
            }
        }

        gradeDropdown.addEventListener('change', () => {
            const selectedGrade = gradeDropdown.value;
            subjectDropdown.innerHTML = '<option value="">Select Subject</option>';
            topicDropdown.innerHTML = '<option value="">Select Asset Model</option>';
            subjectDropdown.disabled = true; topicDropdown.disabled = true;

            if (selectedGrade && globalCatalog[selectedGrade]) {
                Object.keys(globalCatalog[selectedGrade]).forEach(subject => {
                    const opt = document.createElement('option');
                    opt.value = subject; opt.innerText = subject;
                    subjectDropdown.appendChild(opt);
                });
                subjectDropdown.disabled = false;
            }
        });

        subjectDropdown.addEventListener('change', () => {
            const selectedGrade = gradeDropdown.value;
            const selectedSubject = subjectDropdown.value;
            topicDropdown.innerHTML = '<option value="">Select Asset Model</option>';
            topicDropdown.disabled = true;

            if (selectedGrade && selectedSubject && globalCatalog[selectedGrade][selectedSubject]) {
                globalCatalog[selectedGrade][selectedSubject].forEach(file => {
                    const opt = document.createElement('option');
                    opt.value = file; opt.innerText = file;
                    topicDropdown.appendChild(opt);
                });
                topicDropdown.disabled = false;
            }
        });

        actionBtn.addEventListener('click', () => {
            const grade = gradeDropdown.value;
            const subject = subjectDropdown.value;
            const file = topicDropdown.value;

            if (!grade || !subject || !file) {
                alert("Please select Grade, Subject and Simulation file model.");
                return;
            }

            aiStatusLabel.innerText = "STATUS: INJECTING PAYLOAD MAP...";
            
            while(baseGroup.children.length > 0){ baseGroup.remove(baseGroup.children[0]); }

            const assetPath = `/models/${grade}/${subject}/${file}`;
            const loader = new THREE.GLTFLoader();

            loader.load(assetPath, (gltf) => {
                currentModel = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                currentModel.position.x += (currentModel.position.x - center.x);
                currentModel.position.y += (currentModel.position.y - center.y);
                currentModel.position.z += (currentModel.position.z - center.z);
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scaleFactor = 3.6 / maxDim;
                baseGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);
                
                baseGroup.add(currentModel);
                
                targetRotationY = 0; targetRotationX = 0;
                targetCameraZ = 8;
                baseGroup.rotation.set(0,0,0);
                
                aiStatusLabel.innerText = "STATUS: SYSTEM ENGINE SECURE";
            }, 
            undefined,
            (error) => {
                alert("PARSING FAILURE: 3D model asset pathway tracking broken.");
                aiStatusLabel.innerText = "STATUS: PARSING BREAK";
            });
        });

        // =====================================================================
        // WEB-SOCKET GEOMETRIC STREAM LISTENERS
        // =====================================================================
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.detected && baseGroup.children.length > 0) {
                if (data.zoom_active) {
                    // Normalize skin contour pixel areas safely into WebGL depth points
                    const targetZ = THREE.MathUtils.mapLinear(data.zoom_distance, 4000, 28000, 11.5, 3.2);
                    targetCameraZ = THREE.MathUtils.clamp(targetZ, 3.0, 13.0);
                    aiStatusLabel.innerText = "STATUS: GESTURE: DEPTH SCALE MODIFIED";
                } else {
                    // Safe boundaries math mapping formulas for natural angle rotations
                    targetRotationY = (data.x - 0.5) * 5.5; 
                    targetRotationX = (data.y - 0.5) * 3.8; 
                    aiStatusLabel.innerText = "STATUS: CORE TRACKING LIVE";
                }
            }
        };

        ws.onclose = () => {
            aiStatusLabel.innerText = "STATUS: LOCAL SOCKET TERMINATED";
            aiStatusLabel.style.color = "#ef4444";
        };

        window.onload = () => {
            init3DEnvironment();
            fetchSystemCatalog();
        };
    </script>
</body>
</html>
